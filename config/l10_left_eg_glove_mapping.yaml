hand_joint: L10
hand_type: left
can: can0

# Motion controls:
# control_hz: command loop rate. Higher feels more live, but 60 is a good start.
control_hz: 60
# dry_run: true prints poses only; use --no-dry-run to move the hand.
dry_run: true
# hand_output_mode: calibrated uses each channel's hand_open and hand_closed values.
# Use "calibrated" if you want each channel's hand_open and hand_closed values instead.
hand_output_mode: calibrated
# normalized_hand_open/closed: full-range set-state values used in normalized_255 mode.
normalized_hand_open: 255
normalized_hand_closed: 0
# send_interval_sec: 0.0 sends every control loop for fastest live teleoperation.
# Use 1.0 only for slow set-state snapshot tests.
send_interval_sec: 0.0
# motion_profile: responsive_1to1 ignores max_delta_per_cycle for fastest following.
# Use "safe" if you want max_delta_per_cycle to slow sudden jumps.
motion_profile: responsive_1to1
# smoothing_mode: one_euro is adaptive smoothing for fast-but-smooth glove motion.
# Use "none" for raw motion or "ema" for simple exponential smoothing.
smoothing_mode: one_euro
# smoothing_alpha: used only when smoothing_mode is ema. Higher is faster, lower is smoother.
smoothing_alpha: 0.18
# one_euro_min_cutoff: baseline responsiveness. Higher is faster; lower removes more jitter.
one_euro_min_cutoff: 2.0
# one_euro_beta: fast-motion boost. Higher follows quick open/close movements faster.
one_euro_beta: 0.08
# one_euro_d_cutoff: derivative smoothing for the speed estimate. Usually leave at 1.0.
one_euro_d_cutoff: 1.0
# pose_deadband: ignore tiny pose changes. 0 gives most 1:1 response.
pose_deadband: 0
# max_delta_per_cycle: speed limit per update. 0 means no limit. Ignored in responsive_1to1.
max_delta_per_cycle: 0
motor_count: 10

# Used on Ctrl+C in live mode. This is the left-hand "Open Hand" pose from
# LinkerHand/config/L10_positions.yaml.
safe_exit_pose: [255, 0, 255, 255, 255, 255, 255, 255, 255, 255]

glove_reader:
  # The existing repo has serial parsing in glove_to_l10.py for KTH5702 text
  # lines. Future modes can be added in GloveReader for UDP, ROS, or vendor SDKs.
  mode: serial
  port: /dev/ttyUSB0
  baud: 115200

# Linker EG raw serial order used by this bridge:
# 0 pinky_0, 1 pinky_1, 2 pinky_2, 3 ring_0, 4 ring_1, 5 ring_2,
# 6 middle_0, 7 middle_1, 8 middle_2, 9 index_0, 10 index_1, 11 index_2,
# 12 thumb_0, 13 thumb_1, 14 thumb_2.
#
# Sensor suffix meaning for this setup:
# *_0 = rotation/base-roll, *_1 = pitch/open-close, *_2 = abduction/side.
# To manually change a motor, edit both glove_key and source_sensor_index using
# the table above. Leave motor_index and l10_joint_name alone.
#
# The effective open pose is [255, 0, 255, 255, 255, 255, 255, 255, 255, 255].
channels:
  - name: thumb_cmc_pitch
    glove_key: thumb_1
    source_sensor_index: 13
    l10_joint_name: Thumb CMC Pitch
    motor_index: 0
    glove_open: 0
    glove_closed: 1000
    hand_open: 0
    hand_closed: 255
    invert: true
    # gain: master-to-slave movement multiplier. Raise if this motor moves too little.
    gain: 1.0
  - name: thumb_adduction_abduction
    glove_key: thumb_2
    source_sensor_index: 14
    l10_joint_name: Thumb Adduction/Abduction
    motor_index: 1
    glove_open: 0
    glove_closed: 1000
    hand_open: 0
    hand_closed: 255
    invert: false
    # gain: master-to-slave movement multiplier. Raise if this motor moves too little.
    gain: 1.0
  - name: index_finger_mcp_pitch
    glove_key: index_1
    source_sensor_index: 10
    l10_joint_name: Index Finger MCP Pitch
    motor_index: 2
    glove_open: 0
    glove_closed: 1000
    hand_open: 255
    hand_closed: 0
    invert: false
    # gain: master-to-slave movement multiplier. Raise if this motor moves too little.
    gain: 1.0
  - name: middle_finger_mcp_pitch
    glove_key: middle_1
    source_sensor_index: 7
    l10_joint_name: Middle Finger MCP Pitch
    motor_index: 3
    glove_open: 0
    glove_closed: 1000
    hand_open: 255
    hand_closed: 0
    invert: false
    # gain: master-to-slave movement multiplier. Raise if this motor moves too little.
    gain: 1.0
  - name: ring_finger_mcp_pitch
    glove_key: ring_1
    source_sensor_index: 4
    l10_joint_name: Ring Finger MCP Pitch
    motor_index: 4
    glove_open: 0
    glove_closed: 1000
    hand_open: 255
    hand_closed: 0
    invert: false
    # gain: master-to-slave movement multiplier. Raise if this motor moves too little.
    gain: 1.0
  - name: pinky_finger_mcp_pitch
    glove_key: pinky_1
    source_sensor_index: 1
    l10_joint_name: Pinky Finger MCP Pitch
    motor_index: 5
    glove_open: 0
    glove_closed: 1000
    hand_open: 255
    hand_closed: 0
    invert: false
    # gain: master-to-slave movement multiplier. Raise if this motor moves too little.
    gain: 1.0
  - name: index_finger_adduction_abduction
    glove_key: index_2
    source_sensor_index: 11
    l10_joint_name: Index Finger Adduction/Abduction
    motor_index: 6
    glove_open: 0
    glove_closed: 1000
    hand_open: 255
    hand_closed: 0
    invert: false
    # gain: master-to-slave movement multiplier. Raise if this motor moves too little.
    gain: 1.0
  - name: ring_finger_adduction_abduction
    glove_key: ring_2
    source_sensor_index: 5
    l10_joint_name: Ring Finger Adduction/Abduction
    motor_index: 7
    glove_open: 0
    glove_closed: 1000
    hand_open: 255
    hand_closed: 0
    invert: false
    # gain: master-to-slave movement multiplier. Raise if this motor moves too little.
    gain: 1.0
  - name: pinky_finger_adduction_abduction
    glove_key: pinky_2
    source_sensor_index: 2
    l10_joint_name: Pinky Finger Adduction/Abduction
    motor_index: 8
    glove_open: 0
    glove_closed: 1000
    hand_open: 255
    hand_closed: 0
    invert: false
    # gain: master-to-slave movement multiplier. Raise if this motor moves too little.
    gain: 1.0
  - name: thumb_rotation
    glove_key: thumb_0
    source_sensor_index: 12
    l10_joint_name: Thumb Rotation
    motor_index: 9
    enabled: true
    fixed_value: null
    glove_open: 0
    glove_closed: 1000
    hand_open: 255
    hand_closed: 0
    invert: false
    # gain: master-to-slave movement multiplier. Raise if this motor moves too little.
    gain: 1.0
