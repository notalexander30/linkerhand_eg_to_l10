# Auto YAML used for live L10 control.
# This file is now tracked because the robot computer is usually running:
#   python3 control_l10_left_from_eg_glove.py --config config/l10_left_eg_glove_mapping.auto.yaml --no-dry-run
#
# IMPORTANT EDITING RULE:
# - Change glove_key and source_sensor_index together.
# - Do not change motor_index unless the L10 SDK joint order changes.
# - After editing, stop and restart the Python control script.

hand_joint: L10  # L10 hand model; leave this as L10 for LinkerHand L10.
hand_type: left  # Slave hand side. You are controlling a LEFT L10 hand.
can: can0        # SocketCAN interface. Change only if your CAN adapter uses another name.

# control_hz: command loop frequency. Higher can feel faster but uses more CPU/CAN traffic.
control_hz: 60

# dry_run: true prints poses only. Use --no-dry-run on the command line to move the real hand.
dry_run: true

# hand_output_mode:
# - normalized_255: every active motor maps open->255 and closed->0.
#   In this mode, each channel's hand_open/hand_closed values are ignored.
# - calibrated: each channel uses its own hand_open/hand_closed values.
hand_output_mode: normalized_255
normalized_hand_open: 255   # Used only in normalized_255 mode.
normalized_hand_closed: 0   # Used only in normalized_255 mode.

# send_interval_sec: 0.0 sends every loop. Use 1.0 only for slow snapshot testing.
send_interval_sec: 0.0

# motion_profile:
# - responsive_1to1: fastest live following; ignores max_delta_per_cycle.
# - safe: uses max_delta_per_cycle to slow sudden jumps.
motion_profile: responsive_1to1

# Smoothing:
# - one_euro: best current setting for smooth but fast motion.
# - none: raw/no smoothing.
# - ema: simple smoothing controlled by smoothing_alpha.
smoothing_mode: one_euro
smoothing_alpha: 0.18       # Used only when smoothing_mode is ema.
one_euro_min_cutoff: 2.0    # Lower = smoother while still. Higher = more responsive.
one_euro_beta: 0.08         # Higher = faster response during quick motion.
one_euro_d_cutoff: 1.0      # Usually leave at 1.0.
pose_deadband: 0            # 0 means tiny pose changes are still sent.
max_delta_per_cycle: 0      # 0 means no speed cap; ignored in responsive_1to1.

motor_count: 10

# Pose sent when you press Ctrl+C in live mode.
# Order is L10 motors 0..9:
# [thumb pitch, thumb abd, index pitch, middle pitch, ring pitch, pinky pitch,
#  index side, ring side, pinky side, thumb rotation]
safe_exit_pose: [255, 255, 255, 255, 255, 255, 128, 67, 89, 255]

glove_reader:
  mode: serial          # Current glove input mode.
  port: /dev/ttyUSB0   # Change if the glove appears as another serial port.
  baud: 115200         # Serial baud rate for the glove stream.

# Raw EG sensor arrangement used by control_l10_left_from_eg_glove.py:
# 0 pinky_0, 1 pinky_1, 2 pinky_2, 3 ring_0, 4 ring_1, 5 ring_2,
# 6 middle_0, 7 middle_1, 8 middle_2, 9 index_0, 10 index_1, 11 index_2,
# 12 thumb_0, 13 thumb_1, 14 thumb_2.
#
# Suffix meaning for this setup:
# *_0 = rotation/base-roll
# *_1 = pitch/open-close
# *_2 = abduction/side
#
# Calibration values:
# glove_open/glove_closed are copied from your attached auto YAML where the same
# raw source_sensor_index existed. If a channel still has 0/1000, that range was
# not captured yet; run capture_glove_ranges.py to fill it.

metadata:
  generated_by: codex_from_attached_auto_yaml
  notes: "Tracked auto YAML. Same naming/mapping as normal YAML, with comments for manual tuning."
  source_auto_file: "l10_left_eg_glove_mapping.auto (1).yaml"
  reference_mapping: "Raw order pinky,ring,middle,index,thumb; *_1 pitch; *_2 abduction/side; thumb_0 rotation."

channels:
  # Motor 0: Thumb pitch/open-close. Change glove_key if another thumb sensor feels better.
  - name: thumb_cmc_pitch
    glove_key: thumb_1          # thumb pitch/open-close sensor.
    source_sensor_index: 13     # raw 13 = thumb_1.
    l10_joint_name: Thumb CMC Pitch
    motor_index: 0
    glove_open: 135.06
    glove_closed: 87.86
    glove_min: 87.86
    glove_max: 135.06
    range_delta: -47.2
    hand_open: 255
    hand_closed: 90
    invert: false              # true reverses this motor's response.
    gain: 1.0                  # >1 moves more; <1 moves less.
    enabled: true              # false ignores glove input and uses fixed_value/hand_open.
    fixed_value: null

  # Motor 1: Thumb abduction/side motion.
  - name: thumb_adduction_abduction
    glove_key: thumb_2          # thumb abduction/side sensor.
    source_sensor_index: 14     # raw 14 = thumb_2.
    l10_joint_name: Thumb Adduction/Abduction
    motor_index: 1
    glove_open: 0              # Range not captured in attached auto YAML.
    glove_closed: 1000
    hand_open: 255
    hand_closed: 0
    invert: false
    gain: 1.0
    enabled: true
    fixed_value: null

  # Motor 2: Index pitch/open-close.
  - name: index_finger_mcp_pitch
    glove_key: index_1
    source_sensor_index: 10     # raw 10 = index_1.
    l10_joint_name: Index Finger MCP Pitch
    motor_index: 2
    glove_open: 298.77
    glove_closed: 266.74
    glove_min: 266.74
    glove_max: 298.77
    range_delta: -32.03
    hand_open: 255
    hand_closed: 0
    invert: false
    gain: 1.0
    enabled: true
    fixed_value: null

  # Motor 3: Middle pitch/open-close.
  - name: middle_finger_mcp_pitch
    glove_key: middle_1
    source_sensor_index: 7      # raw 7 = middle_1.
    l10_joint_name: Middle Finger MCP Pitch
    motor_index: 3
    glove_open: 218.61
    glove_closed: 169.14
    glove_min: 169.14
    glove_max: 218.61
    range_delta: -49.47
    hand_open: 255
    hand_closed: 0
    invert: false
    gain: 1.0
    enabled: true
    fixed_value: null

  # Motor 4: Ring pitch/open-close.
  - name: ring_finger_mcp_pitch
    glove_key: ring_1
    source_sensor_index: 4      # raw 4 = ring_1.
    l10_joint_name: Ring Finger MCP Pitch
    motor_index: 4
    glove_open: 228.41
    glove_closed: 201.29
    glove_min: 201.29
    glove_max: 228.41
    range_delta: -27.12
    hand_open: 255
    hand_closed: 0
    invert: false
    gain: 1.0
    enabled: true
    fixed_value: null

  # Motor 5: Pinky pitch/open-close.
  - name: pinky_finger_mcp_pitch
    glove_key: pinky_1
    source_sensor_index: 1      # raw 1 = pinky_1.
    l10_joint_name: Pinky Finger MCP Pitch
    motor_index: 5
    glove_open: 244.93
    glove_closed: 284.5
    glove_min: 244.93
    glove_max: 284.5
    range_delta: 39.57
    hand_open: 255
    hand_closed: 0
    invert: true                # This range increased on close, so true keeps open/close direction sane.
    gain: 1.0
    enabled: true
    fixed_value: null

  # Motor 6: Index abduction/side. Use index_2 by current naming rule.
  - name: index_finger_adduction_abduction
    glove_key: index_2
    source_sensor_index: 11     # raw 11 = index_2.
    l10_joint_name: Index Finger Adduction/Abduction
    motor_index: 6
    glove_open: 0              # Not captured yet.
    glove_closed: 1000
    hand_open: 128
    hand_closed: 128
    invert: false
    gain: 1.0
    enabled: true
